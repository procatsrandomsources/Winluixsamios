
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultimate OS Hub</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { margin: 0; background-color: #0f172a; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // --- UI ICONS ---
    const Monitor = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/></svg>;
    const Smartphone = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg>;
    const AlertTriangle = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>;
    const ArrowLeft = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>;
    const Skull = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/><path d="M8 20v2h8v-2"/><path d="m12.5 17-.5-1-.5 1h1z"/><path d="M16 20a2 2 0 0 0 1.56-3.25 8 8 0 1 0-11.12 0A2 2 0 0 0 8 20"/></svg>;
    const Maximize = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>;
    const Minimize = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/></svg>;
    const ExternalLink = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>;

    // --- OS LOGOS ---
    const Win11Logo = () => (
      <svg viewBox="0 0 100 100" className="w-8 h-8" xmlns="http://www.w3.org/2000/svg">
        <rect x="10" y="10" width="38" height="38" fill="#00a4ef" rx="2" />
        <rect x="52" y="10" width="38" height="38" fill="#00a4ef" rx="2" />
        <rect x="10" y="52" width="38" height="38" fill="#00a4ef" rx="2" />
        <rect x="52" y="52" width="38" height="38" fill="#00a4ef" rx="2" />
      </svg>
    );

    const AppleLogo = () => (
      <svg viewBox="0 0 100 100" className="w-8 h-8" xmlns="http://www.w3.org/2000/svg">
        <path d="M50.4,41.5c-0.2-10.6,8.7-15.8,9.1-16.1c-4.9-7.2-12.6-8.2-15.4-8.3c-6.6-0.7-12.8,3.9-16.1,3.9 c-3.4,0-8.5-3.8-14-3.8c-7.1,0-13.7,4.1-17.3,10.5C9.4,40.8,16.5,61,23.5,71.2c3.4,4.9,7.3,10.4,12.6,10.2 c5.1-0.2,7-3.3,13.2-3.3c6.1,0,7.9,3.3,13.3,3.2c5.5-0.1,8.8-5,12.2-9.9c3.9-5.7,5.5-11.2,5.6-11.5C80,60,50.6,48.7,50.4,41.5z" fill="#f8fafc" />
        <path d="M63.3,23.3c2.8-3.4,4.7-8.1,4.2-12.8c-4.1,0.2-9,2.8-11.9,6.2c-2.6,2.9-4.8,7.7-4.2,12.3 C56,29.4,60.5,26.7,63.3,23.3z" fill="#f8fafc" />
      </svg>
    );

    const UbuntuLogo = () => (
      <svg viewBox="0 0 100 100" className="w-8 h-8" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="45" fill="#E95420" />
        <circle cx="50" cy="50" r="25" fill="transparent" stroke="#ffffff" strokeWidth="8" />
        <circle cx="20" cy="50" r="8" fill="#ffffff" />
        <circle cx="65" cy="24" r="8" fill="#ffffff" />
        <circle cx="65" cy="76" r="8" fill="#ffffff" />
        <path d="M20 50 L35 50 M65 24 L55 35 M65 76 L55 65" stroke="#E95420" strokeWidth="10" strokeLinecap="round" />
      </svg>
    );

    const AndroidLogo = () => (
      <svg viewBox="0 0 100 100" className="w-8 h-8" xmlns="http://www.w3.org/2000/svg">
        <path d="M20,55 v20 a10,10 0 0,0 10,10 h40 a10,10 0 0,0 10,-10 v-20 z" fill="#3DDC84" />
        <path d="M20,45 v-10 a30,30 0 0,1 60,0 v10 z" fill="#3DDC84" />
        <circle cx="35" cy="30" r="4" fill="#ffffff" />
        <circle cx="65" cy="30" r="4" fill="#ffffff" />
        <path d="M30,15 L20,5 M70,15 L80,5" stroke="#3DDC84" strokeWidth="4" strokeLinecap="round" />
        <rect x="5" y="45" width="10" height="30" rx="5" fill="#3DDC84" />
        <rect x="85" y="45" width="10" height="30" rx="5" fill="#3DDC84" />
      </svg>
    );

    const ChromeOSLogo = () => (
      <svg viewBox="0 0 100 100" className="w-8 h-8" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="45" fill="#ffffff" />
        <path d="M50 5 L89 72.5 L50 95 Z" fill="#F4B400" />
        <path d="M50 5 L11 72.5 L50 95 Z" fill="#DB4437" />
        <path d="M11 72.5 L89 72.5 L50 95 Z" fill="#0F9D58" />
        <circle cx="50" cy="50" r="20" fill="#4285F4" />
        <circle cx="50" cy="50" r="15" fill="#ffffff" opacity="0.2" />
      </svg>
    );

    const WarningLogo = () => (
      <svg viewBox="0 0 100 100" className="w-8 h-8" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 10 L95 85 L5 85 Z" fill="#F59E0B" />
        <rect x="45" y="35" width="10" height="25" fill="#1E293B" rx="2" />
        <circle cx="50" cy="70" r="6" fill="#1E293B" />
      </svg>
    );

    // --- DATABASE ---
    const categories = [
      {
        id: 'desktop', title: 'Desktop OS', icon: <Monitor className="w-12 h-12 text-blue-400" />,
        description: 'Classic & modern computer operating systems.', color: 'from-blue-500 to-indigo-600',
        items: [
          { id: 'win11', name: 'Windows 11', author: 'BlueEdge', url: 'https://win11.blueedge.me/', logo: <Win11Logo /> },
          { id: 'macos', name: 'macOS Monterey', author: 'PuruVJ', url: 'https://macos.vercel.app/', logo: <AppleLogo /> },
          { id: 'ubuntu', name: 'Ubuntu Linux', author: 'Vivek', url: 'https://vivek9patel.github.io/Ubuntu-OS/', logo: <UbuntuLogo /> },
          { id: 'chromeos', name: 'Chrome OS', author: 'OS Web', url: 'https://os-chrome.vercel.app/', logo: <ChromeOSLogo /> },
          { id: 'win93', name: 'Windows 93', author: 'Jankenpopp', url: 'https://www.windows93.net/', logo: <Win11Logo /> },
        ]
      },
      {
        id: 'mobile', title: 'Mobile Devices', icon: <Smartphone className="w-12 h-12 text-emerald-400" />,
        description: 'Web-based clones of smartphone operating systems.', color: 'from-emerald-500 to-teal-600',
        items: [
          { id: 'ios', name: 'iOS 15', author: 'Web Clone', url: 'https://ios.vercel.app/', logo: <AppleLogo /> },
          { id: 'android', name: 'Android OS', author: 'Web Clone', url: 'https://android-web-theta.vercel.app/', logo: <AndroidLogo /> },
        ]
      },
      {
        id: 'pranks', title: 'Prank Screens', icon: <AlertTriangle className="w-12 h-12 text-amber-400" />,
        description: 'Fake updates and blue screens. F11 for maximum effect!', color: 'from-amber-500 to-orange-600',
        items: [
          { id: 'up_win10', name: 'Win 10 Update', author: 'FakeUpdate.net', url: 'https://fakeupdate.net/win10u/', logo: <WarningLogo /> },
          { id: 'up_mac', name: 'Apple Update', author: 'FakeUpdate.net', url: 'https://fakeupdate.net/apple/', logo: <AppleLogo /> },
          { id: 'bsod', name: 'Blue Screen of Death', author: 'FakeUpdate.net', url: 'https://fakeupdate.net/win10u/bsod.html', logo: <Skull className="w-8 h-8 text-blue-500" /> },
        ]
      }
    ];

    function App() {
      const [activeCategory, setActiveCategory] = useState(null);
      const [activeEmu, setActiveEmu] = useState(null);
      const [isFullscreen, setIsFullscreen] = useState(false);
      const containerRef = useRef(null);

      useEffect(() => {
        const handleFullscreenChange = () => setIsFullscreen(!!document.fullscreenElement);
        document.addEventListener('fullscreenchange', handleFullscreenChange);
        return () => document.removeEventListener('fullscreenchange', handleFullscreenChange);
      }, []);

      const toggleFullscreen = async () => {
        if (!document.fullscreenElement) {
          if (containerRef.current) {
            try { await containerRef.current.requestFullscreen(); } catch (err) { console.error(err); }
          }
        } else {
          if (document.exitFullscreen) await document.exitFullscreen();
        }
      };

      if (!activeCategory && !activeEmu) {
        return (
          <div className="min-h-screen text-slate-100 p-8 flex flex-col items-center justify-center relative">
            <div className="relative z-10 text-center max-w-4xl w-full mx-auto">
              <h1 className="text-5xl font-extrabold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-emerald-400 to-amber-400">
                Ultimate OS Hub
              </h1>
              <p className="text-slate-400 text-lg mb-12 max-w-2xl mx-auto">Choose a category to begin.</p>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                {categories.map((cat) => (
                  <button key={cat.id} onClick={() => setActiveCategory(cat)} className="flex flex-col items-center p-8 rounded-3xl bg-slate-800/50 border border-slate-700 hover:scale-105 transition-transform text-left">
                    <div className={`p-5 rounded-2xl bg-gradient-to-br ${cat.color} bg-opacity-10 mb-6`}>{cat.icon}</div>
                    <h2 className="text-2xl font-bold mb-3 text-white">{cat.title}</h2>
                    <p className="text-slate-400 text-center text-sm">{cat.description}</p>
                  </button>
                ))}
              </div>
            </div>
          </div>
        );
      }

      if (activeCategory && !activeEmu) {
        return (
          <div className="min-h-screen text-slate-100 p-8 flex flex-col">
            <button onClick={() => setActiveCategory(null)} className="flex items-center gap-2 text-slate-400 hover:text-white w-fit mb-8 bg-slate-800 px-4 py-2 rounded-full border border-slate-700">
              <ArrowLeft className="w-5 h-5" /> Back to Hub
            </button>
            <div className="flex items-center gap-4 mb-10">
              <div className={`p-4 rounded-2xl bg-gradient-to-br ${activeCategory.color}`}>
                {React.cloneElement(activeCategory.icon, { className: "w-8 h-8 text-white" })}
              </div>
              <div><h1 className="text-4xl font-bold text-white">{activeCategory.title}</h1></div>
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
              {activeCategory.items.map((emu) => (
                <button key={emu.id} onClick={() => setActiveEmu(emu)} className="flex items-center gap-5 p-5 rounded-2xl bg-slate-800 border border-slate-700 hover:bg-slate-700 text-left transition-colors">
                  <div className="w-16 h-16 bg-slate-900 rounded-xl p-3">{emu.logo}</div>
                  <div className="overflow-hidden">
                    <h3 className="text-lg font-bold text-slate-100 truncate">{emu.name}</h3>
                    <p className="text-sm text-slate-400 truncate">by {emu.author}</p>
                  </div>
                </button>
              ))}
            </div>
          </div>
        );
      }

      return (
        <div className="flex h-screen w-full bg-black text-slate-100 overflow-hidden">
          <div className={`${isFullscreen ? 'hidden' : 'flex'} flex-col w-72 bg-slate-900 border-r border-slate-800 shrink-0`}>
            <button onClick={() => setActiveEmu(null)} className="p-6 flex items-center gap-3 border-b border-slate-800 hover:bg-slate-800/50 text-left">
              <ArrowLeft className="w-6 h-6 text-slate-400" />
              <div><h2 className="font-bold text-white">Exit System</h2><p className="text-xs text-slate-500">Return to browser</p></div>
            </button>
            <div className="flex-1 overflow-y-auto p-3 space-y-1 custom-scrollbar">
              {activeCategory.items.map((emu) => (
                <button key={emu.id} onClick={() => setActiveEmu(emu)} className={`w-full flex items-center gap-3 p-3 rounded-xl text-left ${activeEmu?.id === emu.id ? 'bg-blue-600/20 text-blue-400' : 'text-slate-300 hover:bg-slate-800'}`}>
                  <div className="w-8 h-8 scale-75">{emu.logo}</div>
                  <span className="font-medium text-sm truncate">{emu.name}</span>
                </button>
              ))}
            </div>
          </div>

          <div ref={containerRef} className="flex-1 flex flex-col relative bg-black">
            <div className={`flex items-center justify-between px-4 py-3 bg-slate-900/95 border-b border-slate-700 z-50 transition-all ${isFullscreen ? 'absolute top-0 w-full opacity-0 hover:opacity-100' : ''}`}>
              <div className="flex items-center gap-3">
                <div className="w-8 h-8">{activeEmu.logo}</div>
                <div><h2 className="font-bold text-sm text-white">{activeEmu.name}</h2></div>
              </div>
              <div className="flex items-center gap-3">
                <a href={activeEmu.url} target="_blank" rel="noopener noreferrer" className="p-2 hover:bg-slate-800 rounded-lg text-slate-300 hover:text-white hidden sm:flex"><ExternalLink className="w-4 h-4" /></a>
                <button onClick={toggleFullscreen} className={`flex items-center gap-2 px-5 py-2 rounded-lg font-bold text-sm ${isFullscreen ? 'bg-slate-700 text-white' : 'bg-blue-600 text-white'}`}>
                  {isFullscreen ? <Minimize className="w-4 h-4" /> : <Maximize className="w-4 h-4" />}
                  {isFullscreen ? 'Exit Fullscreen' : 'Go Fullscreen'}
                </button>
              </div>
            </div>
            <div className="flex-1 relative w-full h-full bg-black">
              <iframe src={activeEmu.url} className="absolute inset-0 w-full h-full border-0 z-10" allowFullScreen sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-modals"></iframe>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

```
